<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gateway Monitor - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link href="{{ url_for('static', path='/css/styles.css') }}" rel="stylesheet">
  </head>
  <body>
    <main class="login-shell">
      <form class="login-panel" method="post" action="/login">
        <h1 class="h3 mb-1">Gateway Monitor</h1>
        <p class="text-secondary mb-4">Acesso restrito</p>

        {% if request.query_params.get("error") %}
          <div class="alert alert-danger py-2">Usuario ou senha invalidos</div>
        {% endif %}

        <div class="mb-3">
          <label class="form-label" for="username">Usuario</label>
          <input class="form-control" id="username" name="username" autocomplete="username" required>
        </div>

        <div class="mb-4">
          <label class="form-label" for="password">Senha</label>
          <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button class="btn btn-primary w-100" type="submit">Entrar</button>
      </form>
    </main>
  </body>
</html>
